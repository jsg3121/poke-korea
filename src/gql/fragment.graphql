fragment PokemonStats on PokemonStats {
  hp
  attack
  defense
  specialAttack
  specialDefense
  speed
  total
}

fragment PokemonAbilityList on PokemonAbilityList {
  pokemonId
  abilityId
  name
  description
  isHidden
}

fragment PokemonInfo on PokemonList {
  id
  generation
  typePrimary
  typeSecondary
  isEvolution
  isFormChange
  evolutionId
  abilityId
  ...PokemonCard
}

fragment PokemonCard on PokemonList {
  id
  number
  name
  types
  isRegionForm
  isMegaEvolution
  isGigantamax
  pokemonStats {
    ...PokemonStats
  }
}

fragment VersionGroup on VersionGroup {
  versionGroupId
  name
  nameKo
  generationId
  baseVersionGroupId
  baseVersionGroupName
}

fragment LearnableSkillPokemonInfo on PokemonDetail {
  id
  name
  types
  isFormChange
  isRegionForm
}

fragment AbilityInfo on Ability {
  id
  abilityId
  name
  description
  pokemonCount
}

fragment PokemonWithAbilityInfo on PokemonWithAbility {
  id
  name
  number
  formName
  formType
  imagePath
  isHidden
  region
  types
}
