fragment PokemonStats on PokemonStats {
  hp
  attack
  defense
  specialAttack
  specialDefense
  speed
  total
}

fragment PokemonAbilityList on PokemonAbilityList {
  pokemonId
  abilityId
  name
  description
  isHidden
}

fragment PokemonInfo on PokemonList {
  id
  generation
  typePrimary
  typeSecondary
  isEvolution
  isFormChange
  evolutionId
  abilityId
  ...PokemonCard
}

fragment PokemonCard on PokemonList {
  id
  number
  name
  types
  isRegionForm
  isMegaEvolution
  pokemonStats {
    ...PokemonStats
  }
}

fragment LevelUpSkills on PokemonLearnableSkillByVersion {
  levelUpSkills {
    level
    skill {
      id
      generationId
      name
      type
      power
      accuracy
      pp
      description
      damageType
    }
  }
}

fragment MachineSkills on PokemonLearnableSkillByVersion {
  machineSkills {
    skill {
      id
      generationId
      name
      type
      power
      accuracy
      pp
      description
      damageType
    }
  }
}

fragment VergionGroup on PokemonLearnableSkillByVersion {
  versionGroup {
    versionGroupId
    name
    nameKo
    generationId
  }
}

fragment LearnableSkillPokemonInfo on PokemonDetail {
  id
  name
  isFormChange
  isRegionForm
}
