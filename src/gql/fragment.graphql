fragment PokemonStats on PokemonStats {
  hp
  attack
  defense
  specialAttack
  specialDefense
  speed
  total
}

fragment PokemonAbilityList on PokemonAbilityList {
  pokemonId
  abilityId
  name
  description
  isHidden
}

fragment PokemonInfo on PokemonList {
  id
  generation
  typePrimary
  typeSecondary
  isEvolution
  isFormChange
  evolutionId
  abilityId
  ...PokemonCard
}

fragment PokemonCard on PokemonList {
  id
  number
  name
  types
  isRegionForm
  isMegaEvolution
  isGigantamax
  pokemonStats {
    ...PokemonStats
  }
}

fragment VersionGroup on VersionGroup {
  versionGroupId
  name
  nameKo
  generationId
  baseVersionGroupId
  baseVersionGroupName
}

fragment LearnableSkillPokemonInfo on PokemonDetail {
  id
  name
  types
  isFormChange
  isRegionForm
}

fragment AbilityInfo on Ability {
  id
  abilityId
  name
  description
  pokemonCount
}

fragment PokemonWithAbilityInfo on PokemonWithAbility {
  id
  name
  number
  formName
  formType
  imagePath
  isHidden
  region
  types
}

# ========== Champions Fragments ==========

fragment ChampionsPokemonCard on ChampionsPokemon {
  id
  externalDexId
  pokemonNumber
  formType
  formCode
  formIndex
  name
  formName
  region
  types
  typePrimary
  typeSecondary
  stats {
    ...PokemonStats
  }
  abilities {
    abilityId
    name
    description
    isHidden
  }
  imagePath
  usageRate
  winRate
}

fragment ChampionsMetaMove on ChampionsMetaMove {
  name
  usageRate
}

fragment ChampionsMetaItem on ChampionsMetaItem {
  name
  usageRate
}

fragment ChampionsMetaAbility on ChampionsMetaAbility {
  name
  usageRate
}

fragment ChampionsMetaPartner on ChampionsMetaPartner {
  pokemonId
  formType
  formCode
  rawName
  name
  imagePath
  usageRate
}

fragment ChampionsEvSpread on ChampionsEvSpread {
  nature
  hp
  atk
  def
  spa
  spd
  spe
  usageRate
}

fragment ChampionsCounter on ChampionsCounter {
  pokemonId
  formCode
  rawName
  pokemonName
  koRate
  switchRate
  sampleCount
}

fragment ChampionsMetaStats on ChampionsMetaStats {
  pokemonId
  formCode
  usageRate
  usageRank
  winRate
  tier
  topMoves {
    ...ChampionsMetaMove
  }
  topItems {
    ...ChampionsMetaItem
  }
  topAbilities {
    ...ChampionsMetaAbility
  }
  topPartners {
    ...ChampionsMetaPartner
  }
  evSpreads {
    ...ChampionsEvSpread
  }
  counters {
    ...ChampionsCounter
  }
  source
  updatedAt
  isStale
}

fragment ChampionsMetaSummary on ChampionsMetaStats {
  pokemonId
  formType
  formCode
  name
  formName
  region
  imagePath
  types
  typePrimary
  typeSecondary
  usageRate
  usageRank
  winRate
  tier
  isStale
  updatedAt
}

fragment ChampionsFormSibling on ChampionsFormSibling {
  id
  pokemonId
  pokemonNumber
  formCode
  formType
  formName
  name
  imagePath
  isCurrent
  usageRate
  tier
}

fragment ChampionsPokemonDetail on ChampionsPokemonDetail {
  pokemon {
    id
    externalDexId
    pokemonNumber
    formType
    formCode
    formIndex
    name
    formName
    region
    types
    typePrimary
    typeSecondary
    stats {
      ...PokemonStats
    }
    abilities {
      abilityId
      name
      description
      isHidden
    }
    imagePath
  }
  formSiblings {
    ...ChampionsFormSibling
  }
  meta {
    pokemonId
    formCode
    usageRate
    usageRank
    winRate
    tier
    topMoves {
      ...ChampionsMetaMove
    }
    topItems {
      ...ChampionsMetaItem
    }
    topAbilities {
      ...ChampionsMetaAbility
    }
    topPartners {
      ...ChampionsMetaPartner
    }
    evSpreads {
      ...ChampionsEvSpread
    }
    counters {
      ...ChampionsCounter
    }
    source
    updatedAt
    isStale
  }
}

fragment ChampionsTeamMember on ChampionsTeamMember {
  pokemonId
  formType
  formCode
  rawName
  displayName
  imagePath
}

fragment ChampionsTeamCore on ChampionsTeamCore {
  id
  format
  month
  size
  rank
  pokemons {
    ...ChampionsTeamMember
  }
  teamsCount
  usageRate
}

fragment ChampionsTeamSlotMove on ChampionsTeamSlotMove {
  rawName
  displayName
}

fragment ChampionsTeamSlot on ChampionsTeamSlot {
  pokemonId
  formType
  formCode
  rawName
  displayName
  imagePath
  item
  itemKo
  ability
  abilityKo
  teraType
  moves {
    ...ChampionsTeamSlotMove
  }
}

fragment ChampionsTournamentTeam on ChampionsTournamentTeam {
  id
  rank
  playerId
  playerName
  country
  wins
  losses
  ties
  slots {
    ...ChampionsTeamSlot
  }
}

fragment ChampionsTournamentSummary on ChampionsTournament {
  id
  externalId
  name
  date
  format
  month
  organizerName
  isOnline
  playersCount
  sourceUrl
}

fragment ChampionsTournamentDetail on ChampionsTournament {
  ...ChampionsTournamentSummary
  teams {
    ...ChampionsTournamentTeam
  }
}
