query GetPokemonSkillList($input: PokemonSkillListInput) {
  getPokemonSkillList(input: $input) {
    edges {
      cursor
      node {
        id
        name
        type
        power
        accuracy
        pp
        description
        generationId
        signatureMoves
        damageType
        zMoves
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}

query GetDetailMovesPokemonInfo($pokemonId: ID!) {
  getPokemonDetail(pokemonId: $pokemonId) {
    ...LearnableSkillPokemonInfo
  }
}

query GetPokemonLearnableSkills($filter: PokemonLearnableSkillsFilterInput!) {
  getPokemonLearnableSkills(filter: $filter) {
    ...VergionGroup
    ...LevelUpSkills
    ...MachineSkills
  }
}

query GetPokemonRegionFormLearnableSkills(
  $filter: PokemonRegionFormLearnableSkillsFilterInput!
  $pokemonId: Int!
) {
  getPokemonRegionForm(pokemonId: $pokemonId) {
    id
    name
    region
    types
  }
  getPokemonRegionFormLearnableSkills(filter: $filter) {
    region
    learnableSkills {
      ...VergionGroup
      ...LevelUpSkills
      ...MachineSkills
    }
  }
}

query GetPokemonNormalFormLearnableSkills(
  $filter: PokemonNormalFormLearnableSkillsFilterInput!
  $pokemonId: Int!
) {
  getPokemonNormalForm(pokemonId: $pokemonId) {
    pokemonId
    imagePath
    types
    name
  }
  getPokemonNormalFormLearnableSkills(filter: $filter) {
    learnableSkills {
      ...VergionGroup
      ...LevelUpSkills
      ...MachineSkills
    }
  }
}
