query GetPokemonList($filter: PokemonFilterInput) {
  getPokemonList(filter: $filter) {
    ...PokemonInfo
  }
}

query GetDailyRandomPokemon {
  getDailyRandomPokemon {
    date
    pokemons {
      ...PokemonCard
    }
  }
}

query GetDailyQuizPreview {
  getDailyQuizPreview {
    date
    abilityQuiz {
      id
      question
      abilityDescription
      correctAnswerIndex
      options {
        koreanName
        englishName
      }
    }
    silhouetteQuiz {
      id
      question
      correctPokemonId
      correctAnswerIndex
      options
    }
    typeQuiz {
      id
      question
      targetType
      correctAnswerIndex
      options {
        id
        koreanName
        types
      }
    }
  }
}

query GetPokemonListPaginated($input: PokemonListInput) {
  getPokemonList: getPokemonListPaginated(input: $input) {
    edges {
      cursor
      node {
        ...PokemonInfo
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query PokemonDetail($pokemonId: ID!) {
  getPokemonDetail(pokemonId: $pokemonId) {
    id
    abilityId
    evolutionId
    generation
    name
    isEvolution
    isFormChange
    isMegaEvolution
    isRegionForm
    types
    number
    typePrimary
    typeSecondary
    pokemonStats {
      ...PokemonStats
    }
    pokemonAbilityList {
      ...PokemonAbilityList
    }
    normalForms {
      id
      pokemonId
      name
      types
      imagePath
      normalFormCode
      stats {
        ...PokemonStats
      }
    }
    learnableSkills {
      levelUpVersionGroupId
      machineVersionGroupId
      levelUpSkills {
        level
        skill {
          id
          name
          description
          generationId
          power
          accuracy
          pp
          type
          damageType
          signatureMoves
          zMoves
        }
      }
      machineSkills {
        skill {
          id
          name
          description
          generationId
          power
          accuracy
          pp
          type
          damageType
          signatureMoves
          zMoves
        }
      }
    }
  }
}

query GetPokemonMegaEvolution($pokemonId: Int) {
