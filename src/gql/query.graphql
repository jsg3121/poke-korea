query GetPokemonList($filter: PokemonFilterInput) {
  getPokemonList(filter: $filter) {
    ...PokemonInfo
  }
}

query PokemonDetail($pokemonId: ID!) {
  getPokemonDetail(pokemonId: $pokemonId) {
    id
    abilityId
    evolutionId
    generation
    name
    isEvolution
    isFormChange
    isMegaEvolution
    isRegionForm
    types
    number
    typePrimary
    typeSecondary
    pokemonStats {
      ...PokemonStats
    }
    pokemonAbilityList {
      ...PokemonAbilityList
    }
    normalForms {
      id
      pokemonId
      name
      types
      imagePath
      normalFormCode
      stats {
        ...PokemonStats
      }
    }
    learnableSkills {
      versionGroup {
        versionGroupId
        name
        nameKo
        generationId
      }
      levelUpSkills {
        level
        skill {
          id
          generationId
          name
          type
          power
          accuracy
          pp
          description
          damageType
        }
      }
      machineSkills {
        skill {
          id
          generationId
          name
          type
          power
          accuracy
          pp
          description
          damageType
        }
      }
    }
  }
}

query GetPokemonMegaEvolution($pokemonId: Int) {
  getPokemonMegaEvolution(pokemonId: $pokemonId) {
    id
    pokemonId
    name
    types
    typePrimary
    typeSecondary
    megaEvolutionCode
    megaEvolutionStats {
      ...PokemonStats
    }
    megaEvolutionAbilityList {
      ...PokemonAbilityList
    }
  }
}

