query GetPokemonSkillList($input: PokemonSkillListInput) {
  getPokemonSkillList(input: $input) {
    edges {
      cursor
      node {
        id
        name
        type
        power
        accuracy
        pp
        description
        generationId
        signatureMoves
        damageType
        zMoves
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
